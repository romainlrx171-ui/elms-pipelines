<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELMS 2026 — BD Pipeline</title>
<style>
:root { --bg:#0a0a0f; --card:#12121a; --border:#1e1e2e; --text:#e0e0e8; --dim:#6b6b80; --accent:#dc2626; --accent2:#ef4444; --green:#22c55e; --yellow:#eab308; --blue:#3b82f6; --purple:#a855f7; --orange:#f97316; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text)}
a{color:var(--accent);text-decoration:none}
.header{background:linear-gradient(135deg,#1a0a0a,#0a0a1a);border-bottom:1px solid var(--border);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.header h1{font-size:22px;font-weight:700}.header h1 span{color:var(--accent)}
.header-sub{color:var(--dim);font-size:12px;margin-top:4px}
.nav{display:flex;gap:8px}
.nav a{padding:8px 16px;border-radius:6px;border:1px solid var(--border);color:var(--dim);font-size:13px;font-weight:600}
.nav a.active{background:rgba(220,38,38,.15);border-color:var(--accent);color:var(--text)}
.stats{display:flex;gap:20px;flex-wrap:wrap;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--card)}
.stat{text-align:center}.stat-num{font-size:26px;font-weight:800}.stat-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.stat-num.green{color:var(--green)}.stat-num.blue{color:var(--blue)}.stat-num.yellow{color:var(--yellow)}.stat-num.purple{color:var(--purple)}.stat-num.red{color:var(--accent2)}

.event-bar{padding:14px 28px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--card)}
.ev-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;font-size:13px;font-weight:600;transition:.2s;display:flex;align-items:center;gap:6px}
.ev-btn:hover{border-color:var(--accent);color:var(--text)}
.ev-btn.active{background:rgba(220,38,38,.15);border-color:var(--accent);color:var(--text)}
.ev-btn .cnt{background:var(--border);padding:1px 6px;border-radius:4px;font-size:11px}
.ev-btn.active .cnt{background:var(--accent);color:white}
.ev-date{font-size:11px;color:var(--dim);font-weight:400}

.controls{padding:12px 28px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border)}
.controls input,.controls select{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:7px 12px;border-radius:6px;font-size:13px;outline:none}
.controls input:focus,.controls select:focus{border-color:var(--accent)}
.controls input{width:240px}

table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);border-bottom:1px solid var(--border);cursor:pointer;position:sticky;top:0;background:var(--bg);z-index:2}
thead th:hover{color:var(--text)}
tbody tr{border-bottom:1px solid var(--border);transition:.15s;cursor:pointer}
tbody tr:hover{background:rgba(220,38,38,.04)}
tbody td{padding:10px 12px;vertical-align:top}

.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.tag-prospect{background:rgba(107,107,128,.15);color:var(--dim)}
.tag-contacted{background:rgba(234,179,8,.15);color:var(--yellow)}
.tag-interested{background:rgba(168,85,247,.15);color:var(--purple)}
.tag-confirmed{background:rgba(34,197,94,.15);color:var(--green)}
.tag-scouted{background:rgba(168,85,247,.15);color:var(--purple)}
.tag-proposal-sent{background:rgba(234,179,8,.2);color:var(--yellow)}
.tag-proposal-done{background:rgba(249,115,22,.15);color:var(--orange)}
.tag-researched{background:rgba(59,130,246,.15);color:var(--blue)}

.ev-tags{display:flex;gap:4px;flex-wrap:wrap}
.ev-tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;background:rgba(255,255,255,.06);color:var(--dim)}
.ev-tag.hl{background:rgba(220,38,38,.15);color:var(--accent2)}

.name{font-weight:600;font-size:14px}.meta-sub{color:var(--dim);font-size:11px;margin-top:2px}
.value{font-weight:700;color:var(--green);white-space:nowrap}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.dot-high{background:var(--accent2)}.dot-norm{background:var(--dim)}
.next{font-size:12px;color:var(--yellow);max-width:220px}
.pipeline{padding:0 28px 28px;overflow-x:auto}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.overlay.active{display:flex}
.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:640px;width:92%;max-height:85vh;overflow-y:auto}
.panel h2{font-size:20px;margin-bottom:4px}
.panel .pmeta{color:var(--dim);font-size:13px;margin-bottom:16px}
.section{margin-bottom:14px}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px}
.section-body{font-size:14px;line-height:1.6}
.btn{background:var(--accent);color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn:hover{background:var(--accent2)}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>BD <span>Pipeline</span></h1>
    <div class="header-sub">ELMS 2026 — Hospitality & Business Development by Event</div>
  </div>
  <div class="nav">
    <a href="index.html">Sponsors</a>
    <a href="bd.html" class="active">BD Platform</a>
  </div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-num blue" id="s-total">0</div><div class="stat-label">Companies</div></div>
  <div class="stat"><div class="stat-num yellow" id="s-events">5</div><div class="stat-label">Events</div></div>
  <div class="stat"><div class="stat-num green" id="s-value">0</div><div class="stat-label">Pipeline Value</div></div>
  <div class="stat"><div class="stat-num purple" id="s-hp">0</div><div class="stat-label">High Priority</div></div>
</div>
<div class="event-bar">
  <button class="ev-btn active" data-ev="all" onclick="filterEv('all')">All <span class="cnt" id="cnt-all">0</span></button>
  <button class="ev-btn" data-ev="paul-ricard" onclick="filterEv('paul-ricard')">Paul Ricard <span class="ev-date">May 3</span> <span class="cnt" id="cnt-paul-ricard">0</span></button>
  <button class="ev-btn" data-ev="imola" onclick="filterEv('imola')">Imola <span class="ev-date">Jul 5</span> <span class="cnt" id="cnt-imola">0</span></button>
  <button class="ev-btn" data-ev="spa" onclick="filterEv('spa')">Spa <span class="ev-date">Aug 23</span> <span class="cnt" id="cnt-spa">0</span></button>
  <button class="ev-btn" data-ev="silverstone" onclick="filterEv('silverstone')">Silverstone <span class="ev-date">Sep 13</span> <span class="cnt" id="cnt-silverstone">0</span></button>
  <button class="ev-btn" data-ev="portimao" onclick="filterEv('portimao')">Portimao <span class="ev-date">Oct 10</span> <span class="cnt" id="cnt-portimao">0</span></button>
</div>
<div class="controls">
  <input type="text" id="search" placeholder="Search companies..." oninput="render()">
  <select id="f-status" onchange="render()">
    <option value="">All Statuses</option>
    <option value="prospect">Prospect</option>
    <option value="scouted">Scouted</option>
    <option value="proposal-sent">Proposal Sent</option>
    <option value="contacted">Contacted</option>
    <option value="confirmed">Confirmed</option>
  </select>
  <select id="f-priority" onchange="render()">
    <option value="">All Priority</option>
    <option value="high">High Priority</option>
  </select>
</div>
<div class="pipeline">
  <table><thead><tr>
    <th onclick="sortBy('name')">Company</th>
    <th onclick="sortBy('status')">Status</th>
    <th onclick="sortBy('value')">Value</th>
    <th>Events</th>
    <th>Next Action</th>
  </tr></thead><tbody id="tbody"></tbody></table>
</div>
<div class="overlay" id="overlay" onclick="if(event.target===this)closePanel()">
  <div class="panel" id="panel"></div>
</div>
<script src="bd-data.js"></script>
<script>
const LS_KEY = 'elms-bd-pipeline-v1';
let data = JSON.parse(localStorage.getItem(LS_KEY)) || BD_DATA;
let curEv = 'all', sf = 'name', sd = 1;
const EV_NAMES = {'paul-ricard':'Paul Ricard','imola':'Imola','spa':'Spa','silverstone':'Silverstone','portimao':'Portimao'};

function init(){updateStats();render()}
function save(){localStorage.setItem(LS_KEY, JSON.stringify(data))}

function updateStats(){
  const c = data.companies;
  document.getElementById('s-total').textContent = c.length;
  document.getElementById('s-hp').textContent = c.filter(x=>x.highPriority).length;
  const lo = c.reduce((a,x)=>a+(x.valueLow||0),0);
  const hi = c.reduce((a,x)=>a+(x.valueHigh||0),0);
  document.getElementById('s-value').textContent = Math.round(lo/1000)+'k-'+Math.round(hi/1000)+'k';
  document.getElementById('cnt-all').textContent = c.length;
  ['paul-ricard','imola','spa','silverstone','portimao'].forEach(ev=>{
    document.getElementById('cnt-'+ev).textContent = c.filter(x=>x.events&&x.events.includes(ev)).length;
  });
}

function filterEv(ev){
  curEv=ev;
  document.querySelectorAll('.ev-btn').forEach(b=>b.classList.toggle('active',b.dataset.ev===ev));
  render();
}

function getFiltered(){
  let list=[...data.companies];
  if(curEv!=='all') list=list.filter(c=>c.events&&c.events.includes(curEv));
  const q=document.getElementById('search').value.toLowerCase();
  if(q) list=list.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.notes||'').toLowerCase().includes(q));
  const s=document.getElementById('f-status').value;
  if(s) list=list.filter(c=>c.status===s);
  const p=document.getElementById('f-priority').value;
  if(p==='high') list=list.filter(c=>c.highPriority);
  list.sort((a,b)=>{
    let va,vb;
    if(sf==='value'){va=a.valueHigh||0;vb=b.valueHigh||0}
    else if(sf==='status'){va=a.status||'';vb=b.status||''}
    else{va=a.name||'';vb=b.name||''}
    return typeof va==='string'?va.localeCompare(vb)*sd:(va-vb)*sd;
  });
  return list;
}

function sortBy(f){if(sf===f)sd*=-1;else{sf=f;sd=1}render()}

function statusTag(s){
  const cls={'prospect':'tag-prospect','scouted':'tag-scouted','contacted':'tag-contacted','interested':'tag-interested','confirmed':'tag-confirmed','proposal-sent':'tag-proposal-sent','proposal-done':'tag-proposal-done','researched':'tag-researched'};
  return '<span class="tag '+(cls[s]||'tag-prospect')+'">'+(s||'prospect').replace(/-/g,' ')+'</span>';
}

function evTags(events){
  if(!events||!events.length)return'-';
  return '<div class="ev-tags">'+events.map(ev=>'<span class="ev-tag'+(curEv===ev?' hl':'')+'">'+( EV_NAMES[ev]||ev)+'</span>').join('')+'</div>';
}

function render(){
  const list=getFiltered();
  document.getElementById('tbody').innerHTML=list.map(c=>{
    const vt=c.valueType==='event'?'/ev':'/szn';
    return '<tr onclick="show(\''+c.id+'\')"><td><span class="dot '+(c.highPriority?'dot-high':'dot-norm')+'"></span><span class="name">'+c.name+'</span><div class="meta-sub">'+(c.notes||'').substring(0,80)+'...</div></td><td>'+statusTag(c.status)+'</td><td><span class="value">'+(c.valueLow/1000)+'-'+(c.valueHigh/1000)+'k'+vt+'</span></td><td>'+evTags(c.events)+'</td><td><span class="next">'+(c.nextAction||'-')+'</span></td></tr>';
  }).join('');
}

function show(id){
  const c=data.companies.find(x=>x.id===id);
  if(!c)return;
  const vt=c.valueType==='event'?'/event':'/season';
  document.getElementById('panel').innerHTML='<h2><span class="dot '+(c.highPriority?'dot-high':'dot-norm')+'"></span>'+c.name+'</h2><div class="pmeta">'+(c.status||'prospect').replace(/-/g,' ')+' | '+(c.valueLow/1000)+'-'+(c.valueHigh/1000)+'k'+vt+'</div><div class="section"><div class="section-title">Events</div><div class="section-body">'+evTags(c.events)+'</div></div>'+(c.whyTheyFit?'<div class="section"><div class="section-title">Why They Fit</div><div class="section-body">'+c.whyTheyFit+'</div></div>':'')+(c.pitchAngle?'<div class="section"><div class="section-title">Pitch</div><div class="section-body" style="font-style:italic;color:var(--accent2)">"'+c.pitchAngle+'"</div></div>':'')+(c.keyContact?'<div class="section"><div class="section-title">Key Contact</div><div class="section-body">'+c.keyContact+'</div></div>':'')+'<div class="section"><div class="section-title">Next Action</div><div class="section-body" style="color:var(--yellow)">'+(c.nextAction||'-')+'</div></div><div class="section"><div class="section-title">Notes</div><div class="section-body" style="color:var(--dim)">'+c.notes+'</div></div><div style="margin-top:20px;display:flex;gap:8px;flex-wrap:wrap"><select id="st-sel" style="background:var(--bg);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:13px"><option value="prospect"'+(c.status==='prospect'?' selected':'')+'>Prospect</option><option value="scouted"'+(c.status==='scouted'?' selected':'')+'>Scouted</option><option value="contacted"'+(c.status==='contacted'?' selected':'')+'>Contacted</option><option value="proposal-sent"'+(c.status==='proposal-sent'?' selected':'')+'>Proposal Sent</option><option value="confirmed"'+(c.status==='confirmed'?' selected':'')+'>Confirmed</option></select><button class="btn" onclick="updateSt(\''+c.id+'\')">Update</button><button class="btn" style="background:var(--border);margin-left:auto" onclick="closePanel()">Close</button></div>';
  document.getElementById('overlay').classList.add('active');
}
function closePanel(){document.getElementById('overlay').classList.remove('active')}
function updateSt(id){const c=data.companies.find(x=>x.id===id);if(!c)return;c.status=document.getElementById('st-sel').value;save();updateStats();render();closePanel()}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel()});
init();
</script>
</body>
</html>
